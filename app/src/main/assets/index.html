<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>무장쟁패</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
  body,html{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Arial',sans-serif;}
  #game{width:100vw;height:100vh;position:relative;}
  canvas{display:block;}
  #hud{position:absolute;inset:0;pointer-events:none;padding:12px;}
  .hpwrap{position:absolute;top:12px;left:14px;width:42%;}
  .pname{color:#fff;font-weight:bold;font-size:15px;text-shadow:1px 1px 3px #000;}
  .ptitle{color:#ffcc66;font-size:10px;text-shadow:1px 1px 2px #000;margin-bottom:3px;}
  .barc{position:relative;background:rgba(0,0,0,0.6);border:2px solid #644;height:17px;border-radius:4px;overflow:hidden;margin-bottom:4px;}
  #hpg{position:absolute;inset:0;width:100%;background:#8a1a1a;transition:width .5s ease-out;}
  #hp{position:absolute;inset:0;width:100%;background:linear-gradient(90deg,#ffd044,#ff7a00);transition:width .08s linear;}
  .mwrap{height:8px;}
  #musou{position:absolute;inset:0;width:0%;background:linear-gradient(90deg,#ff4400,#ffdd00);transition:width .1s linear;}
  #musou.full{animation:mp .45s infinite alternate;}
  @keyframes mp{from{filter:brightness(1);}to{filter:brightness(2);}}
  .killwrap{position:absolute;top:12px;right:14px;text-align:right;}
  #kills{color:#ffcc00;font-size:30px;font-weight:900;text-shadow:0 0 12px #ff5500,2px 2px 3px #000;}
  .klabel{color:#ccaa88;font-size:11px;}
  #stagebox{color:#ff9955;font-size:13px;font-weight:bold;text-shadow:1px 1px 3px #000;margin-top:3px;}
  #viewBtn{pointer-events:auto;margin-top:8px;padding:7px 12px;font-size:12px;font-weight:bold;color:#ffd;background:rgba(0,0,0,0.55);border:1.5px solid #886;border-radius:14px;}
  #combo{position:absolute;top:104px;left:24px;color:#ffcc00;font-size:27px;font-style:italic;font-weight:900;text-shadow:2px 2px 6px #000;opacity:0;transition:opacity .15s;}
  #banner{position:absolute;top:33%;left:0;width:100%;text-align:center;color:#ffd044;font-size:42px;font-weight:900;text-shadow:0 0 22px #ff2200,3px 3px 4px #000;opacity:0;transition:opacity .4s;pointer-events:none;letter-spacing:6px;}
  #subbanner{position:absolute;top:45%;left:0;width:100%;text-align:center;color:#ffb;font-size:15px;text-shadow:1px 1px 3px #000;opacity:0;transition:opacity .4s;pointer-events:none;}
  .dmgf{position:absolute;color:#fff;font-weight:900;font-size:18px;text-shadow:0 0 7px #ff4400,2px 2px 3px #000;pointer-events:none;will-change:transform,opacity;}
  #mm{position:absolute;left:12px;bottom:158px;width:116px;height:116px;border-radius:50%;border:2px solid rgba(255,220,150,0.4);background:rgba(10,6,4,0.55);}
  #controls{position:absolute;bottom:14px;left:0;width:100%;display:flex;justify-content:space-between;align-items:flex-end;padding:0 14px;pointer-events:auto;}
  #jzone{width:130px;height:130px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.25);border-radius:50%;position:relative;touch-action:none;}
  #jstick{width:50px;height:50px;background:rgba(255,204,0,0.75);border-radius:50%;position:absolute;top:40px;left:40px;}
  .abtns{display:grid;grid-template-columns:repeat(2,62px);gap:9px;}
  .btn{width:62px;height:62px;border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid #fff;color:#fff;font-weight:bold;font-size:14px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
  .btn:active{background:#ffcc00;color:#000;}
  #btn-musou{grid-column:span 2;width:100%;height:44px;border-radius:12px;background:linear-gradient(45deg,#5a0000,#ff3300);border-color:#ff5500;font-size:15px;letter-spacing:3px;}
  #btn-musou.ready{animation:ug .5s infinite alternate;}
  @keyframes ug{from{box-shadow:0 0 5px #ff5500;}to{box-shadow:0 0 24px #ff5500,0 0 44px #ffaa00;}}
  #credit{position:absolute;bottom:2px;left:0;width:100%;text-align:center;color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:1px;pointer-events:none;}
  .screen{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,#3a1408,#0a0403 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;}
  .screen h1{color:#ffd044;font-size:50px;font-weight:900;letter-spacing:13px;text-shadow:0 0 30px #ff3300,4px 4px 6px #000;margin-bottom:6px;}
  .screen .sub{color:#cc8855;font-size:13px;letter-spacing:4px;margin-bottom:24px;}
  .screen .story{color:#c9b8a0;font-size:13px;line-height:1.9;text-align:center;max-width:520px;padding:0 24px;margin-bottom:28px;}
  .bigbtn{padding:14px 52px;font-size:17px;font-weight:bold;letter-spacing:6px;color:#000;background:linear-gradient(45deg,#ffd044,#ff8800);border:none;border-radius:28px;cursor:pointer;box-shadow:0 0 24px rgba(255,140,0,0.5);}
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <div class="hpwrap">
      <div class="pname">관우 운장</div>
      <div class="ptitle">청룡언월도 · 만인지적</div>
      <div class="barc"><div id="hpg"></div><div id="hp"></div></div>
      <div class="barc mwrap"><div id="musou"></div></div>
    </div>
    <div class="killwrap">
      <div id="kills">0</div>
      <div class="klabel">격파</div>
      <div id="stagebox">제 1 진</div>
      <div id="ridebox" style="color:#77ddff;font-size:12px;font-weight:bold;text-shadow:1px 1px 3px #000;margin-top:2px;display:none;">기마 26s</div>
      <button id="viewBtn">시점: 3인칭</button>
    </div>
    <div id="combo"></div>
    <canvas id="mm" width="116" height="116"></canvas>
    <div id="controls">
      <div id="jzone"><div id="jstick"></div></div>
      <div class="abtns">
        <button class="btn" id="btn-a">공격</button>
        <button class="btn" id="btn-b">강격</button>
        <button class="btn" id="btn-d">회피</button>
        <button class="btn" id="btn-j">도약</button>
        <button class="btn" id="btn-musou">무 쌍</button>
      </div>
    </div>
  </div>
  <div id="bosshud" style="position:absolute;top:78px;left:50%;transform:translateX(-50%);width:56%;display:none;pointer-events:none;">
   <div style="color:#dd99ff;font-size:13px;font-weight:bold;text-align:center;text-shadow:1px 1px 3px #000;">대현량사 장각</div>
   <div style="position:relative;height:14px;background:rgba(0,0,0,0.65);border:2px solid #663388;border-radius:4px;overflow:hidden;">
    <div id="bosshpfill" style="position:absolute;inset:0;width:100%;background:linear-gradient(90deg,#aa44ff,#ff44aa);transition:width .12s linear;"></div></div>
  </div>
  <div id="banner"></div>
  <div id="subbanner"></div>
  <div id="credit">무장쟁패 v0.2.1 · 영찬영하 Daddy · J패밀리</div>
  <div class="screen" id="title">
    <h1>무장쟁패</h1>
    <div class="sub">武將爭覇 — 난세의 일기당천</div>
    <div class="story">서기 184년, 황건적의 난이 천하를 뒤덮었다.<br>
      불타는 마을, 쓰러진 깃발 사이로 한 무장이 언월도를 든다.<br>
      다섯 진을 격파하고 난세를 평정하라.</div>
    <button class="bigbtn" id="startBtn">출 진</button>
  </div>
  <div class="screen" id="shop" style="display:none;">
    <h1 style="font-size:34px;letter-spacing:8px;">전 공 포 상</h1>
    <div class="sub">전공 <span id="meritval">0</span>점</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:560px;margin-bottom:22px;">
     <button class="bigbtn" style="padding:12px 22px;font-size:14px;letter-spacing:2px;" onclick="buy('atk')">공격력 +15%<br><small>260</small></button>
     <button class="bigbtn" style="padding:12px 22px;font-size:14px;letter-spacing:2px;" onclick="buy('hp')">최대 체력 +150<br><small>220</small></button>
     <button class="bigbtn" style="padding:12px 22px;font-size:14px;letter-spacing:2px;" onclick="buy('sp')">무쌍 충전<br><small>200</small></button>
    </div>
    <button class="bigbtn" onclick="closeShop()">진 군</button>
   </div>
   <div class="screen" id="endscr" style="display:none;">
    <h1 id="endtitle">패 배</h1>
    <div class="story" id="endstory"></div>
    <button class="bigbtn" onclick="location.reload()">재 출 진</button>
  </div>
</div>

<script src="three.min.js"></script>
<script src="three/Pass.js"></script>
<script src="three/CopyShader.js"></script>
<script src="three/LuminosityHighPassShader.js"></script>
<script src="three/MaskPass.js"></script>
<script src="three/ShaderPass.js"></script>
<script src="three/RenderPass.js"></script>
<script src="three/EffectComposer.js"></script>
<script src="three/UnrealBloomPass.js"></script>
<script src="three/SimplexNoise.js"></script>
<script src="three/SSAOShader.js"></script>
<script src="three/SSAOPass.js"></script>
<script>
"use strict";
// ==================================================================
//  무장쟁패 v0.0.2 — 5라운드 비판·개발 반복 결과
//  R1 8등신 인체 비율 · 황건적 두건  R2 양손 파지+관절별 랙(follow-through)
//  R3 FOV60·저상 카메라·원경 융기 지형+거리안개  R4 앵커속도 상속 천+몸통 충돌
// ==================================================================
const W=()=>innerWidth,H=()=>innerHeight,PI=Math.PI,TAU=PI*2;
// ===== 절차적 오디오 =====
const SND={ctx:null,master:null,mus:null,on:false,
 init(){if(this.ctx)return;
  const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
  this.ctx=new AC();this.master=this.ctx.createGain();this.master.gain.value=0.55;this.master.connect(this.ctx.destination);
  this.mus=this.ctx.createGain();this.mus.gain.value=0.3;this.mus.connect(this.master);this.on=true;this.startBGM();},
 noise(dur){const c=this.ctx,len=Math.floor(c.sampleRate*dur);
  const b=c.createBuffer(1,len,c.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  const src=c.createBufferSource();src.buffer=b;return src;},
 env(node,peak,atk,dec,when){const c=this.ctx,g=c.createGain();
  g.gain.setValueAtTime(0.0001,when);g.gain.exponentialRampToValueAtTime(peak,when+atk);
  g.gain.exponentialRampToValueAtTime(0.0001,when+atk+dec);node.connect(g);return g;},
 hit(power){if(!this.on)return;const c=this.ctx,t=c.currentTime;
  const src=this.noise(0.22),f=c.createBiquadFilter();
  f.type='lowpass';f.frequency.setValueAtTime(2600,t);f.frequency.exponentialRampToValueAtTime(260,t+0.16);
  src.connect(f);const g=this.env(f,0.5*power,0.004,0.19,t);g.connect(this.master);src.start(t);src.stop(t+0.24);
  const o=c.createOscillator();o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(48,t+0.14);
  const g2=this.env(o,0.42*power,0.005,0.14,t);g2.connect(this.master);o.start(t);o.stop(t+0.2);},
 swish(){if(!this.on)return;const c=this.ctx,t=c.currentTime;
  const src=this.noise(0.3),f=c.createBiquadFilter();f.type='bandpass';f.Q.value=1.5;
  f.frequency.setValueAtTime(500,t);f.frequency.exponentialRampToValueAtTime(2800,t+0.13);
  src.connect(f);const g=this.env(f,0.2,0.02,0.16,t);g.connect(this.master);src.start(t);src.stop(t+0.3);},
 clang(){if(!this.on)return;const c=this.ctx,t=c.currentTime;
  [1860,2540,3310].forEach((fr,i)=>{const o=c.createOscillator();o.type='triangle';o.frequency.value=fr;
   const g=this.env(o,0.13/(i+1),0.003,0.5,t);g.connect(this.master);o.start(t);o.stop(t+0.55);});},
 hoof(){if(!this.on)return;const c=this.ctx,t=c.currentTime;
  const src=this.noise(0.1),f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=420;
  src.connect(f);const g=this.env(f,0.24,0.003,0.08,t);g.connect(this.master);src.start(t);src.stop(t+0.12);},
 bow(){if(!this.on)return;const c=this.ctx,t=c.currentTime;
  const o=c.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(300,t+0.1);
  const g=this.env(o,0.1,0.004,0.1,t);g.connect(this.master);o.start(t);o.stop(t+0.14);},
 roar(){if(!this.on)return;const c=this.ctx,t=c.currentTime;
  const src=this.noise(1.1),f=c.createBiquadFilter();f.type='lowpass';
  f.frequency.setValueAtTime(700,t);f.frequency.exponentialRampToValueAtTime(120,t+0.9);
  src.connect(f);const g=this.env(f,0.5,0.06,1.0,t);g.connect(this.master);src.start(t);src.stop(t+1.2);},
 pickup(){if(!this.on)return;const c=this.ctx,t=c.currentTime;
  [660,880,1320].forEach((fr,i)=>{const o=c.createOscillator();o.type='sine';o.frequency.value=fr;
   const g=this.env(o,0.14,0.01,0.28,t+i*0.06);g.connect(this.master);o.start(t+i*0.06);o.stop(t+i*0.06+0.34);});},
 gong(){if(!this.on)return;const c=this.ctx,t=c.currentTime;
  [180,268,395,540].forEach((fr,i)=>{const o=c.createOscillator();o.type='sine';o.frequency.value=fr;
   const g=this.env(o,0.24/(i+1),0.006,2.4,t);g.connect(this.master);o.start(t);o.stop(t+2.6);});},
 startBGM(){const c=this.ctx;this.bgmT=c.currentTime+0.4;this.bgmStep=0;},
 tickBGM(){if(!this.on)return;const c=this.ctx;
  while(this.bgmT<c.currentTime+0.6){
   const t=this.bgmT,st=this.bgmStep%16;
   // 전고(戰鼓) 리듬
   if(st%4===0||st===6||st===14){const src=this.noise(0.24),f=c.createBiquadFilter();
    f.type='lowpass';f.frequency.setValueAtTime(240,t);f.frequency.exponentialRampToValueAtTime(70,t+0.2);
    src.connect(f);const g=this.env(f,st%8===0?0.42:0.24,0.004,0.22,t);g.connect(this.mus);src.start(t);src.stop(t+0.26);}
   // 5음계 관악 모티프
   if(st%8===0){const scale=[196,220,262,294,330];
    const fr=scale[(this.bgmStep/8|0)%scale.length];
    const o=c.createOscillator();o.type='triangle';o.frequency.setValueAtTime(fr,t);
    o.frequency.linearRampToValueAtTime(fr*1.02,t+0.5);
    const g=this.env(o,0.09,0.08,0.7,t);g.connect(this.mus);o.start(t);o.stop(t+0.85);}
   this.bgmT+=0.24;this.bgmStep++;}},
 intensity(v){if(this.on&&this.mus)this.mus.gain.value=0.18+v*0.22;}
};
// ===== PBR 텍스처 =====
const TL=new THREE.TextureLoader();
function loadTex(name,rep,aniso){
 const d=TL.load('tex/'+name+'_d.png'),n2=TL.load('tex/'+name+'_n.png');
 for(const t of[d,n2]){t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rep,rep);t.anisotropy=aniso||4;}
 d.encoding=THREE.sRGBEncoding;
 return{map:d,normalMap:n2};}
const TEX={};
function initTex(){
 TEX.skin=loadTex('skin',2.2,8);
 TEX.cloth=loadTex('cloth',3.0,4);
 TEX.leather=loadTex('leather',2.4,4);
 TEX.metal=loadTex('metal',1.8,8);
 TEX.wood=loadTex('wood',1.6,4);
 TEX.hide=loadTex('hide',2.6,4);}
initTex();
const FOGC=new THREE.Color(0x8a5a34),FOGN=38,FOGF=165;
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(FOGC.getHex(),FOGN,FOGF);
const camera=new THREE.PerspectiveCamera(60,W()/H(),0.1,400);
let fovBase=60,fovKick=0;
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:"high-performance"});
renderer.setSize(W(),H());renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.35;
renderer.physicallyCorrectLights=false;
document.getElementById('game').appendChild(renderer.domElement);
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
const ssao=new THREE.SSAOPass(scene,camera,W(),H());
ssao.kernelRadius=0.32;ssao.minDistance=0.0035;ssao.maxDistance=0.055;
ssao.output=THREE.SSAOPass.OUTPUT.Default;
composer.addPass(ssao);
const bloom=new THREE.UnrealBloomPass(new THREE.Vector2(W(),H()),0.55,0.45,0.92);
composer.addPass(bloom);
// 최종 그레이드: 콘트라스트 · 색온도 · 비네트 · 필름그레인
const GradeShader={uniforms:{tDiffuse:{value:null},uT:{value:0},uSat:{value:1},uGrain:{value:0.022},uVig:{value:0.42}},
 vertexShader:"varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",
 fragmentShader:"varying vec2 vUv;uniform sampler2D tDiffuse;uniform float uT,uSat,uGrain,uVig;"+
 "float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}"+
 "void main(){vec3 c=texture2D(tDiffuse,vUv).rgb;"+
 " c=(c-0.5)*1.05+0.5+0.045;"+                                  // 콘트라스트
 " c.r*=1.035; c.b*=0.968;"+                              // 따뜻한 색온도
 " float l=dot(c,vec3(0.299,0.587,0.114)); c=mix(vec3(l),c,uSat);"+
 " float d=distance(vUv,vec2(0.5)); c*=mix(1.0,smoothstep(1.05,0.42,d),uVig);"+
 " float g=rnd(vUv*vec2(1024.0,768.0)+uT)-0.5; c+=g*uGrain;"+
 " gl_FragColor=vec4(clamp(c,0.0,1.0),1.0);}"};
const gradePass=new THREE.ShaderPass(GradeShader);
composer.addPass(gradePass);
// 적응형 품질: 프레임 저하 시 SSAO 자동 해제
const QUAL={fps:60,acc:0,frames:0,ssaoOn:true,checked:0};

// ---------- 하늘돔 + 태양 ----------
const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,
 uniforms:{uSun:{value:new THREE.Vector3(0.5,0.26,-0.8).normalize()},uHor:{value:new THREE.Vector3(0.96,0.45,0.16)}},
 vertexShader:"varying vec3 vD; void main(){vD=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",
 fragmentShader:"varying vec3 vD; uniform vec3 uSun; uniform vec3 uHor;"+
  "void main(){float h=clamp(vD.y,0.0,1.0);"+
  " vec3 hor=uHor; vec3 mid=uHor*0.55; vec3 top=uHor*0.14+vec3(0.03,0.02,0.06);"+
  " vec3 c=mix(hor,mid,smoothstep(0.0,0.25,h)); c=mix(c,top,smoothstep(0.2,0.7,h));"+
  " float s=max(dot(vD,uSun),0.0);"+
  " c+=vec3(1.0,0.75,0.4)*pow(s,220.0)*3.0; c+=vec3(1.0,0.5,0.2)*pow(s,7.0)*0.45;"+
  " gl_FragColor=vec4(c,1.0);}"});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(170,24,16),skyMat));

// ---------- 조명 ----------
const hemi=new THREE.HemisphereLight(0xffe0c0,0x4a3a28,1.05);scene.add(hemi);
scene.add(new THREE.AmbientLight(0x6a5040,0.72));
const rimLight=new THREE.DirectionalLight(0xffc088,1.05);rimLight.position.set(-22,9,26);scene.add(rimLight);
const fillLight=new THREE.DirectionalLight(0x9ab0dd,0.55);fillLight.position.set(-14,16,-18);scene.add(fillLight);
const sun=new THREE.DirectionalLight(0xffd0a0,1.7);
sun.position.set(30,20,-46);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.radius=2.2;
sun.shadow.camera.left=-34;sun.shadow.camera.right=34;sun.shadow.camera.top=34;sun.shadow.camera.bottom=-34;
sun.shadow.camera.far=120;sun.shadow.bias=-0.0006;scene.add(sun);
const fireA=new THREE.PointLight(0xff5510,2.6,32,2);scene.add(fireA);
const fireB=new THREE.PointLight(0xff7722,2.2,32,2);scene.add(fireB);

// ---------- 지형: 원경 융기 + 거리안개 내장 ----------
const groundMat=new THREE.ShaderMaterial({

  "void main(){vUv=uv;"+

// ---------- 격자 천 (앵커속도 상속 + 몸통충돌 옵션) ----------
class ClothGrid{
 constructor(rows,cols,spacing,mat,pinFn,opt){
  this.rows=rows;this.cols=cols;this.sp=spacing;this.pinFn=pinFn;this.opt=opt||{};
  this.pts=[];this.pinCache=new Array(rows*cols);this.pinPrev=new Array(rows*cols);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
   const pin=pinFn(r,c);const base=pin?pin.clone():new THREE.Vector3((c-cols/2)*spacing,2-r*spacing,0);
   this.pts.push({p:base.clone(),pp:base.clone()});}
  const geo=new THREE.BufferGeometry();
  this.arr=new Float32Array(rows*cols*3);
  const uv=new Float32Array(rows*cols*2);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){uv[(r*cols+c)*2]=c/(cols-1);uv[(r*cols+c)*2+1]=1-r/(rows-1);}
  const idx=[];
  for(let r=0;r<rows-1;r++)for(let c=0;c<cols-1;c++){const a=r*cols+c,b=a+1,d=a+cols,e2=d+1;idx.push(a,d,b,b,d,e2);}
  geo.setAttribute('position',new THREE.BufferAttribute(this.arr,3));
  geo.setAttribute('uv',new THREE.BufferAttribute(uv,2));
  geo.setIndex(idx);
  this.mesh=new THREE.Mesh(geo,mat);this.mesh.frustumCulled=false;this.mesh.castShadow=true;scene.add(this.mesh);
 }
 update(dt){
  const damp=0.965,g=-9.8*dt*dt,k=dt*dt;
  if(!this.pinPool)this.pinPool=new Array(this.rows*this.cols);
  for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){
   const i=r*this.cols+c,pin=this.pinFn(r,c);
   if(pin){if(!this.pinPool[i])this.pinPool[i]=new THREE.Vector3();
    this.pinPool[i].copy(pin);this.pinCache[i]=this.pinPool[i];}
   else this.pinCache[i]=null;}
  for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){
   const i=r*this.cols+c,pt=this.pts[i],pin=this.pinCache[i];
   if(pin){ // R4: 앵커 속도 상속 — pp를 이전 앵커 위치로
    if(this.pinPrev[i])pt.pp.copy(this.pinPrev[i]);else pt.pp.copy(pin);
    pt.p.copy(pin);
    if(!this.pinPrev[i])this.pinPrev[i]=new THREE.Vector3();
    this.pinPrev[i].copy(pin);continue;}
   windAt(pt.p,_w);
   let ex=0,ez=0;if(this.opt.extraFn){const e2=this.opt.extraFn();ex=e2.x;ez=e2.z;}
   const nx=pt.p.x+(pt.p.x-pt.pp.x)*damp+(_w.x*1.9+ex)*k;
   const ny=pt.p.y+(pt.p.y-pt.pp.y)*damp+g+_w.y*2.4*k;
   const nz=pt.p.z+(pt.p.z-pt.pp.z)*damp+(_w.z*1.9+ez)*k;
   pt.pp.copy(pt.p);pt.p.set(nx,ny,nz);
   if(pt.p.y<0.04)pt.p.y=0.04;}
  for(let iter=0;iter<4;iter++){
   for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){
    const i=r*this.cols+c;
    if(c<this.cols-1)this.solve(i,i+1,this.sp);
    if(r<this.rows-1)this.solve(i,i+this.cols,this.sp);}}
  // R4: 몸통 충돌 — 등 뒤 평면 밖으로 밀어냄
  if(this.opt.body){
   const bp=this.opt.body.pos(),yaw=this.opt.body.yaw();
   const sy=Math.sin(yaw),cy=Math.cos(yaw);
   for(let i=0;i<this.pts.length;i++){
    if(this.pinCache[i])continue;
    const p=this.pts[i].p;
    const dx=p.x-bp.x,dz=p.z-bp.z,hy=p.y-bp.y;
    if(hy<0.15||hy>1.6)continue;
    const lz=dx*sy+dz*cy,lx=dx*cy-dz*sy;      // 몸 로컬(전방=+z)
    if(lz>-0.16&&Math.abs(lx)<0.34){
     const push=-0.16-lz;
     p.x+=sy*push;p.z+=cy*push;}}}
  for(let i=0;i<this.pts.length;i++){const p=this.pts[i].p;
   this.arr[i*3]=p.x;this.arr[i*3+1]=p.y;this.arr[i*3+2]=p.z;}
  this.mesh.geometry.attributes.position.needsUpdate=true;
  this.mesh.geometry.computeVertexNormals();
 }
 solve(a,b,rest){const pa=this.pts[a],pb=this.pts[b];
  const dx=pb.p.x-pa.p.x,dy=pb.p.y-pa.p.y,dz=pb.p.z-pa.p.z;
  let d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1e-6;
  const maxd=rest*1.35;                       // 신장 한계 — 천 폭주 방지
  const target=d>maxd?maxd:rest;
  const diff=(d-target)/d*0.5;
  const aPin=this.pinCache[a],bPin=this.pinCache[b];
  if(!aPin){pa.p.x+=dx*diff;pa.p.y+=dy*diff;pa.p.z+=dz*diff;}
  if(!bPin){pb.p.x-=dx*diff;pb.p.y-=dy*diff;pb.p.z-=dz*diff;}}
 dispose(){scene.remove(this.mesh);this.mesh.geometry.dispose();}
}
// ---------- 스트립 천 (앵커속도 상속) ----------
class Strip{
 constructor(anchorFn,segs,len,color,width,extraFn){
  this.anchorFn=anchorFn;this.n=segs;this.len=len;this.width=width;this.extraFn=extraFn;
  this.prevA=null;
  this.pts=[];const a=anchorFn();
  for(let i=0;i<segs;i++){const p=a.pos.clone();p.y-=i*len;this.pts.push({p:p,pp:p.clone()});}
  const geo=new THREE.BufferGeometry();this.arr=new Float32Array(segs*2*3);
  geo.setAttribute('position',new THREE.BufferAttribute(this.arr,3));
  const idx=[];for(let i=0;i<segs-1;i++){const q=i*2;idx.push(q,q+1,q+2,q+1,q+3,q+2);}geo.setIndex(idx);
  this.mat=new THREE.MeshStandardMaterial({color:color,roughness:0.86,side:THREE.DoubleSide,map:TEX.cloth.map,normalMap:TEX.cloth.normalMap});
  geo.computeVertexNormals();
  this.mesh=new THREE.Mesh(geo,this.mat);this.mesh.frustumCulled=false;scene.add(this.mesh);}
 update(dt){const a=this.anchorFn();
  if(this.prevA)this.pts[0].pp.copy(this.prevA);else this.pts[0].pp.copy(a.pos);
  this.pts[0].p.copy(a.pos);
  if(!this.prevA)this.prevA=new THREE.Vector3();this.prevA.copy(a.pos);
  const g=-9.8*dt*dt,k=dt*dt;
  for(let i=1;i<this.n;i++){const pt=this.pts[i];windAt(pt.p,_w);
   let ex=0,ez=0;if(this.extraFn){const e2=this.extraFn();ex=e2.x;ez=e2.z;}
   const nx=pt.p.x+(pt.p.x-pt.pp.x)*0.958+(_w.x*2.2+ex)*k;
   const ny=pt.p.y+(pt.p.y-pt.pp.y)*0.958+g;
   const nz=pt.p.z+(pt.p.z-pt.pp.z)*0.958+(_w.z*2.2+ez)*k;
   pt.pp.copy(pt.p);pt.p.set(nx,ny,nz);if(pt.p.y<0.04)pt.p.y=0.04;}
  for(let iter=0;iter<3;iter++)for(let i=1;i<this.n;i++){
   const p0=this.pts[i-1].p,p1=this.pts[i].p;
   const dx=p1.x-p0.x,dy=p1.y-p0.y,dz=p1.z-p0.z;
   const d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1e-6;
   const tgt=d>this.len*1.35?this.len*1.35:this.len;
   const diff=(d-tgt)/d;
   const kk=(i===1)?1:0.5;
   p1.x-=dx*diff*kk;p1.y-=dy*diff*kk;p1.z-=dz*diff*kk;
   if(i>1){p0.x+=dx*diff*(1-kk);p0.y+=dy*diff*(1-kk);p0.z+=dz*diff*(1-kk);}}
  const side=a.side,hw=this.width*0.5;
  for(let i=0;i<this.n;i++){const p=this.pts[i].p,w2=hw*(1-i/this.n*0.35);
   this.arr[i*6]=p.x+side.x*w2;this.arr[i*6+1]=p.y+side.y*w2;this.arr[i*6+2]=p.z+side.z*w2;
   this.arr[i*6+3]=p.x-side.x*w2;this.arr[i*6+4]=p.y-side.y*w2;this.arr[i*6+5]=p.z-side.z*w2;}
  this.mesh.geometry.attributes.position.needsUpdate=true;
  this.mesh.geometry.computeVertexNormals();}
 dispose(){scene.remove(this.mesh);this.mesh.geometry.dispose();}
}

 poseLocomotion(speed,dt,t){
  // 보행 진폭 + 항상 살아있는 idle 미세동작(1-amp 블렌드)
  const amp=Math.min(1,speed*0.62);
  this.walkPhase+=speed*dt*5.6*(this.gait||1);
  this.breath+=dt*1.7;
  const ph=this.walkPhase,sL=Math.sin(ph),sR=Math.sin(ph+PI);
  const br=Math.sin(this.breath),sway=Math.sin(this.breath*0.5),idle=1-amp;
  // 다리: 큰 보폭 + idle 무게중심 미세 굴신
  this.T('tLX',sL*0.85*amp - idle*0.04);
  this.T('tRX',sR*0.85*amp - idle*0.04);
  this.T('kL',Math.max(0,Math.sin(ph-1.25))*1.3*amp+0.08+Math.max(0,sway)*0.05*idle);
  this.T('kR',Math.max(0,Math.sin(ph+PI-1.25))*1.3*amp+0.08+Math.max(0,-sway)*0.05*idle);
  this.T('aL',-(this.G('tLX')+this.G('kL'))*0.55+Math.max(0,-sL)*0.5*amp);
  this.T('aR',-(this.G('tRX')+this.G('kR'))*0.55+Math.max(0,-sR)*0.5*amp);
  this.T('tLZ',0.04*amp+idle*0.02);this.T('tRZ',-0.04*amp-idle*0.02);
  // 골반: 바운스+스웨이+요잉 (idle에도 체중이동)
  this.T('hipsY',Math.abs(Math.cos(ph))*0.05*amp + br*0.008*idle);
  this.T('hipsX',Math.sin(ph)*0.032*amp + sway*0.022*idle);
  this.T('hipsRY',Math.sin(ph)*0.16*amp + sway*0.05*idle);
  this.T('hipsRZ',Math.sin(ph)*0.05*amp);
  // 상체: 골반 역회전 + 호흡 융기
  this.T('toY',-Math.sin(ph)*0.24*amp - sway*0.05*idle);
  this.T('toX',0.05+amp*0.24 + br*0.022*idle);
  this.T('toZ',-Math.sin(ph)*0.05*amp + Math.sin(this.breath*0.7)*0.015*idle);
  // 머리: 보행 끄덕임 + idle 좌우 살핌 (lookAt가 있으면 그쪽이 덮어씀)
  this.T('neX',-amp*0.16 + br*0.05);
  this.T('neY',sway*0.16*idle);
  // 양손 파지: 두 팔 모두 보행에 맞춰 스윙 + 항상 호흡 흔들림
  if(this.weapon){

   this.T('eR',-0.5-Math.max(0,sL)*0.2*amp);
   this.T('sLX',-0.35+sw+hb);this.T('sLZ',0.55);this.T('sLY',-0.45);
   this.T('eL',-1.15-Math.max(0,sL)*0.12*amp);
   this.T('wpX',-0.75-amp*0.28+br*0.06);this.T('wpZ',0.35+Math.sin(ph)*0.06*amp);}
  else{
   this.T('sLX',sR*0.7*amp-0.06+br*0.05);this.T('sLZ',0.1);this.T('eL',-0.28-Math.max(0,sR)*0.55*amp);
   this.T('sRX',sL*0.7*amp-0.06+br*0.05);this.T('sRZ',-0.1);this.T('eR',-0.28-Math.max(0,sL)*0.55*amp);}
  this.T('rootX',0);

 // R2: 양손 대검법 — 왼팔이 오른팔을 따라가는 합격 스윙

   g.setAttribute('position',new THREE.BufferAttribute(arr,3));

   const mesh=new THREE.Mesh(g,m);mesh.frustumCulled=false;mesh.visible=false;scene.add(mesh);
   return{arr:arr,m:m,mesh:mesh};};
  this.glow=mk(accent,0.55);this.core=mk(0xffffff,0.85);}
 emit(tip,mid){this.pts.unshift({a:tip.clone(),b:mid.clone()});if(this.pts.length>this.n)this.pts.pop();
  const fill=(L,shrink)=>{L.mesh.visible=true;
   for(let i=0;i<this.n;i++){const s2=this.pts[Math.min(i,this.pts.length-1)];
    const bx=s2.b.x+(s2.a.x-s2.b.x)*shrink,by=s2.b.y+(s2.a.y-s2.b.y)*shrink,bz=s2.b.z+(s2.a.z-s2.b.z)*shrink;

    else{r.bladeMat.emissive.setHex(0x000000);r.bladeMat.emissiveIntensity=0;}}
   if(p<0.26)r.poseCrouch(p/0.26*0.55);
   r.poseAttack(Math.min(1,p),1);
   if(p>=0.3&&p<0.55)this.pos.addScaledVector(toP,3.4*dt);   // 내딛으며 찌르기
   if(p>=0.44&&!this.hitDone){this.hitDone=true;
    if(this.ally){if(this.target&&dist<2.4){this.target.hurt(34,this.pos,false);SND.hit(0.7);}}
    else if(dist<2.2&&player.iFrames<=0)playerHit(this.elite?46:26,this.pos);}
   if(p>=1){this.state='RUN';this.atkT=0;this.hitDone=false;if(r.bladeMat){r.bladeMat.emissive.setHex(0x000000);r.bladeMat.emissiveIntensity=0;}}}
  else if(this.cls==='archer'&&!this.ally){       // 궁병: 거리 유지 + 사격
   this.shootT-=dt;
   if(dist<7){const away=toP.clone().multiplyScalar(-1);this.pos.addScaledVector(away,this.speed*0.85*dt);spd=this.speed*0.85;}
   else if(dist>13){this.pos.addScaledVector(toP,this.speed*0.7*dt);spd=this.speed*0.7;}
   else if(this.shootT<=0){this.shootT=2.4+Math.random()*1.8;
    r.poseAttack(0.5,1);enemyArrow(this.pos.clone().setY(1.4),player.pos.clone().setY(1.2));SND.bow();}
   r.poseLocomotion(spd,dt,tg);r.lookAt(player.pos.clone().setY(1.5));}
  else if(this.cls==='rider'&&!this.ally&&dist>4&&this.chargeT<=0&&Math.random()<dt*0.6){
   this.chargeT=1.1;this.vel.copy(toP).multiplyScalar(13);}
  else{
   if(this.chargeT>0){this.chargeT-=dt;
    this.pos.addScaledVector(this.vel,dt);this.vel.multiplyScalar(0.93);spd=this.vel.length();
    if(dist<2.2&&player.iFrames<=0){playerHit(38,this.pos);this.chargeT=0;}
    r.poseLocomotion(Math.min(6,spd),dt,tg);r.root.position.copy(this.pos);r.applyPose(dt,12);
    if(this.pos.distanceToSquared(player.pos)<420)r.updateCloth(dt,this.vel);
    return true;}
   if(dist>1.8){spd=this.speed*(this.cls==='rider'?1.5:1);
    const push=new THREE.Vector3();
    for(const o of soldiers){if(o===this||o.state==='DEAD')continue;
     const d2=this.pos.distanceToSquared(o.pos);if(d2<2.6&&d2>1e-4)push.add(new THREE.Vector3().subVectors(this.pos,o.pos).multiplyScalar(1.6/d2));}
    if(push.lengthSq()>9)push.setLength(3);
    this.pos.addScaledVector(toP,spd*dt).addScaledVector(push,dt*1.6);}
   else if(Math.random()<dt*1.5*this.aggro){this.state='ATTACK';this.atkT=0;this.hitDone=false;}
   if(this.state==='RUN'&&dist>4.5&&dist<8&&Math.random()<dt*0.5*this.aggro){
    this.state='LEAP';this.leapT=0;this.vel.set(toP.x*7.5,0,toP.z*7.5);}
   r.poseLocomotion(spd,dt,tg);r.lookAt(player.pos.clone().setY(1.5));}
  const pl=this.pos.length();if(pl>30)this.pos.multiplyScalar(30/pl);
  r.root.position.copy(this.pos);if(this.riderLift)r.root.position.y+=this.riderLift;
  r.applyPose(dt,12);
  if(this.pos.distanceToSquared(player.pos)<420)r.updateCloth(dt,new THREE.Vector3(toP.x*spd,0,toP.z*spd));
  return true;}
 hurt(dmg,fromPos,launch,kbDir){if(this.state==='DEAD')return;
  if(this.cls==='shield'&&this.state!=='HIT'){        // #9 방패: 정면 피해 격감

  FX.burst(this.pos.clone().setY(1.2),0xffcc66,13,5,0.26);

   if(!this.ally)addKill();}
  else{this.state='HIT';this.hitT=0;this.vel.copy(dir).multiplyScalar(launch?5:2.6);}}
 dispose(){scene.remove(this.rig.root);this.rig.disposeCloth();if(this.bossMark)scene.remove(this.bossMark);}

class Pickup{
 constructor(pos,kind){

   new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:2.1,metalness:0.4,roughness:0.25}));

 tick(dt){this.t+=dt;this.life-=dt;

   this.g.position.addScaledVector(pull,(3.2-d)*3.4*dt);}
  if(d<1.5){this.collect();return false;}
  if(this.life<=0){this.dispose();return false;}
  return true;}
 collect(){
  if(this.kind==='atk'){player.atkBuff=12;FX.ring(player.pos,0xff5522,4);showBanner('','공격력 2배 12초');SND.roar();this.dispose();return;}

  if(this.kind==='wpn'){cycleWeapon();this.dispose();return;}
  if(this.kind==='hp'){player.hp=Math.min(player.maxHp,player.hp+180);
   FX.ring(player.pos,0x33ff88,3.4);FX.burst(player.pos.clone().setY(1.2),0x66ffaa,22,4,0.3);
   showBanner('','기력 회복 +180');}

   FX.ring(player.pos,0xffcc33,3.4);FX.burst(player.pos.clone().setY(1.2),0xffdd66,22,4,0.3);
   showBanner('','무쌍 기운 +45');}
  SND.pickup();this.dispose();}
 dispose(){scene.remove(this.g);}
}

 tick(dt){

  const c=player.charge;player.charge=0;doAttack(true,c);};
 b.addEventListener('touchstart',dn,{passive:false});b.addEventListener('touchend',up);
 b.addEventListener('mousedown',dn);b.addEventListener('mouseup',up);})();
bindBtn('btn-d',doDash);bindBtn('btn-j',doJump);bindBtn('btn-musou',doMusou);
function inputMove(){const v=new THREE.Vector3(stick.x,0,stick.y);
 if(keys['a'])v.x-=1;if(keys['d'])v.x+=1;if(keys['w'])v.z-=1;if(keys['s'])v.z+=1;
 if(v.lengthSq()>1)v.normalize();return v;}
function moveVec(){const raw=inputMove();
 if(!firstPerson)return raw;
 const f=-raw.z;
 return new THREE.Vector3(Math.sin(player.yaw)*f,0,Math.cos(player.yaw)*f);}
function doAttack(heavy,chargeLv){if(!gameOn||player.state==='DEAD'||player.state==='MUSOU')return;
 if(player.state==='ATTACK'){if(!heavy&&player.t>player.curAtk.dur*0.5&&player.atkIndex<2)player.queued=true;return;}
 player.state='ATTACK';player.t=0;player.spinYaw=0;SND.swish();
 if(player.rig.bladeMat){const W3=WEAPONS[weaponIdx];
  player.rig.bladeMat.color.setHex(W3.tint);player.rig.bladeMat.emissive.setHex(W3.col);}
 if(heavy){player.curAtk=Object.assign({},HEAVY);player.atkIndex=0;
  const cl=chargeLv||0;
  if(cl>0.35){player.curAtk.dmg=HEAVY.dmg*(1+cl*2.2);player.curAtk.range=HEAVY.range+cl*1.8;
   player.curAtk.chargeLv=cl;FX.ring(player.pos,0xffdd66,3+cl*5);SND.roar();}}
 else player.curAtk=(player.comboWindow>0&&player.atkIndex<2)?ATKS[++player.atkIndex]:ATKS[player.atkIndex=0];
 player.hitDone=false;player.queued=false;
 if(!firstPerson&&!player.mount){let best=null,bd=6.5;
  for(const s2 of soldiers){if(s2.state==='DEAD')continue;const d=s2.pos.distanceTo(player.pos);if(d<bd){bd=d;best=s2;}}
  if(best){const to=new THREE.Vector3().subVectors(best.pos,player.pos);player.yaw=Math.atan2(to.x,to.z);}}}
function doDash(){if(!gameOn||player.state==='DEAD'||player.dashT>0||player.mount)return;
 player.dashT=0.26;player.iFrames=0.32;
 let just=false;                                   // #7 저스트 회피
 for(const s2 of soldiers){if(s2.state!=='ATTACK')continue;
  const p2=s2.atkT/0.75;
  if(p2>0.24&&p2<0.46&&s2.pos.distanceTo(player.pos)<3.6){just=true;break;}}
 if(just){slowMoT=Math.max(slowMoT,0.55);player.iFrames=0.7;player.justT=1.6;
  player.musou=Math.min(100,player.musou+18);
  FX.ring(player.pos,0x99ddff,4.2);SND.clang();showBanner('','간발의 회피 — 반격!');}
 const mv=moveVec();if(mv.lengthSq()>0.01)player.dashDir.copy(mv).normalize();
 else player.dashDir.set(Math.sin(player.yaw),0,Math.cos(player.yaw));
 FX.burst(player.pos.clone().setY(0.6),0xddddcc,10,3.5,0.24,STEX);}
function doJump(){if(!gameOn||player.airborne||player.state==='DEAD'||player.mount)return;player.jumpV=6.6;player.airborne=true;}
function doMusou(){if(!gameOn||player.musou<100||player.state==='DEAD')return;
 if(player.mount){player.musou=0;shake(0.7);FX.ring(player.pos,0xffdd44,11);
  for(const s2 of soldiers){if(s2.state==='DEAD'||s2.ally)continue;if(s2.pos.distanceTo(player.pos)<9)s2.hurt(90,player.pos,true);}
  showBanner('무쌍 기마돌격','');return;}
 player.musou=0;player.state='MUSOU';player.t=0;slowMoT=0.4;
 showBanner('무 쌍 난 무','');shake(0.6);SND.roar();
 FX.ring(player.pos,0xffdd44,9);FX.ring(player.pos,0xff5500,6);
 let n=0;const iv=setInterval(()=>{FX.ring(player.pos,0xffcc33,7+n);
  for(const s2 of soldiers){if(s2.state==='DEAD'||s2.ally)continue;
   if(s2.pos.distanceTo(player.pos)<7.5)s2.hurt(72,player.pos,true);}
  shake(0.4);if(++n>=5)clearInterval(iv);},180);}

// ---------- 플레이어 틱 ----------
function tickMounted(dt,tg){const P=player,R=P.rig,Hs=P.mount;
 P.rideT-=dt;
 const raw=inputMove();
 const mv=firstPerson?moveVec():raw;
 // 조향: 입력 방향으로 말이 선회, 전진 가속
 if(mv.lengthSq()>0.02){
  const ty=firstPerson?P.yaw:Math.atan2(mv.x,mv.z);
  let dy=ty-Hs.yaw;while(dy>PI)dy-=TAU;while(dy<-PI)dy+=TAU;
  Hs.yaw+=dy*Math.min(1,dt*3.2);
  Hs.speed=Math.min(P.state==='ATTACK'?5.2:8.6,Hs.speed+dt*9);}
 else Hs.speed*=0.86;
 if(P.state==='ATTACK'&&Hs.speed>5.2)Hs.speed=Math.max(5.2,Hs.speed*0.9);
 const fwd=new THREE.Vector3(Math.sin(Hs.yaw),0,Math.cos(Hs.yaw));
 Hs.pos.addScaledVector(fwd,Hs.speed*dt);
 const pl=Hs.pos.length();if(pl>30)Hs.pos.multiplyScalar(30/pl);
 P.yaw=Hs.yaw;
 P.pos.set(Hs.pos.x,Hs.pos.y+0.47,Hs.pos.z);
 // 돌진 충돌 — 병사를 튕겨냄
 if(Hs.speed>3){for(const s2 of soldiers){if(s2.state==='DEAD'||s2.ally)continue;
  if(s2.trampleCd>0){s2.trampleCd-=dt;continue;}
  const dx=s2.pos.x-Hs.pos.x,dz=s2.pos.z-Hs.pos.z;
  if(dx*dx+dz*dz<6.0){s2.trampleCd=0.6;
   s2.hurt(30+Hs.speed*5,Hs.pos,true);shake(0.34);hitStop(0.03);
   FX.burst(s2.pos.clone().setY(1.0),0xffbb66,10,4,0.28);}}}
 // 기마 공격
 if(P.state==='ATTACK'){P.t+=dt;const A=P.curAtk,p=P.t/A.dur;
  R.poseRide(dt,Hs.gallop);R.poseAttack(Math.min(1,p),A.type);
  if(p>0.26&&p<0.72){R.tipWorld(P._tip);R.midWorld(P._mid);P.trail.emit(P._tip,P._mid);}
  if(p>=0.32&&p<0.78){                       // 연속 타격 윈도우
   if(!P.mHit)P.mHit=new Set();
   let got=false;
   for(const s2 of soldiers){if(s2.state==='DEAD'||s2.ally||P.mHit.has(s2))continue;
    const dx=s2.pos.x-P.pos.x,dz=s2.pos.z-P.pos.z;
    const d2=dx*dx+dz*dz;
    if(d2<27){                                // 반경 5.2
     const ang=Math.atan2(dx,dz);let da=ang-P.yaw;
     while(da>PI)da-=TAU;while(da<-PI)da+=TAU;
     if(Math.abs(da)<2.5){                     // 좌우 넓은 부채꼴
      P.mHit.add(s2);s2.hurt(A.dmg*1.5,P.pos,true);got=true;}}}
   if(got){shake(0.32);hitStop(0.035);fovKick=7;}}
  if(p>=1&&P.mHit)P.mHit.clear();
  if(p>=1){P.state='IDLE';P.comboWindow=0.7;if(P.mHit)P.mHit.clear();}}
 else{R.poseRide(dt,Hs.gallop);P.trail.fade();}
 // 먼지
 if(Hs.speed>4){P.footT-=dt;if(P.footT<=0){P.footT=0.12;SND.hoof();
  FX.burst(Hs.pos.clone().setY(0.12),0xa89a86,5,2.2,0.3,STEX);}}
 R.root.position.copy(P.pos);R.root.rotation.y=P.yaw;
 R.applyPose(dt,P.state==='ATTACK'?20:14);
 R.updateCloth(dt,fwd.clone().multiplyScalar(Hs.speed));
 // 하차
 const rb=document.getElementById('ridebox');
 rb.style.display='block';rb.textContent='기마 '+Math.max(0,Math.ceil(P.rideT))+'s';
 if(P.rideT<=0||P.hp<=0){
  P.mount=null;Hs.ridden=false;Hs.life=0.1;
  P.pos.set(Hs.pos.x+Math.cos(P.yaw)*1.2,0,Hs.pos.z+Math.sin(P.yaw)*1.2);
  P.state='IDLE';rb.style.display='none';
  FX.burst(P.pos.clone().setY(0.6),0xccbb99,12,3,0.3,STEX);showBanner('','하마');}
}
function tickPlayer(dt,tg){const P=player,R=P.rig;
 if(P.mount){tickMounted(dt,tg);return;}
 if(P.iFrames>0)P.iFrames-=dt;
 if(P.justT>0)P.justT-=dt;
 if(P.atkBuff>0)P.atkBuff-=dt;
 if(P.chargeHold&&P.state!=='ATTACK'){P.charge=Math.min(1,P.charge+dt*0.85);
  if(R.bladeMat){R.bladeMat.emissive.setHex(0xffaa22);R.bladeMat.emissiveIntensity=P.charge*2.4;}
  if(Math.random()<P.charge*0.5)FX.burst(P.pos.clone().setY(1.2),0xffcc44,2,2,0.2);}
 if(P.comboWindow>0)P.comboWindow-=dt;else P.atkIndex=0;
 const raw=inputMove();
 if(firstPerson&&Math.abs(raw.x)>0.05&&P.state!=='DEAD')P.yaw-=raw.x*dt*2.6;
 const mv=P.state==='DEAD'?new THREE.Vector3():moveVec();
 let spd=0;
 if(P.dashT>0){P.dashT-=dt;P.pos.addScaledVector(P.dashDir,14.5*dt);spd=4.5;}
 else if(P.state==='IDLE'||P.state==='RUN'){
  if(mv.lengthSq()>0.01){P.state='RUN';spd=5.3*Math.min(1,mv.length());
   P.pos.addScaledVector(mv,5.3*dt);
   if(!firstPerson){const ty=Math.atan2(mv.x,mv.z);
    let dy=ty-P.yaw;while(dy>PI)dy-=TAU;while(dy<-PI)dy+=TAU;
    P.yaw+=dy*Math.min(1,dt*9);}}
  else P.state='IDLE';}
 P.pos.addScaledVector(P.vel,dt);P.vel.multiplyScalar(0.86);
 if(P.airborne){P.jumpV-=16*dt;P.pos.y+=P.jumpV*dt;
  if(P.pos.y<=0){P.pos.y=0;P.airborne=false;
   FX.ring(P.pos,0xccffee,3.2);FX.burst(P.pos.clone().setY(0.2),0xbbaa88,12,4,0.3,STEX);
   meleeSweep(42,3.0,TAU,false);}}
 const pl=P.pos.length();if(pl>30){P.pos.x*=30/pl;P.pos.z*=30/pl;}
 if(spd>3&&!P.airborne){P.footT-=dt;if(P.footT<=0){P.footT=0.24;
  FX.burst(P.pos.clone().setY(0.12),0x998877,4,1.6,0.22,STEX);}}
 if(P.state==='ATTACK'){P.t+=dt;const A=P.curAtk,p=P.t/A.dur;
  R.poseLocomotion(0.6,dt,tg);R.poseAttack(Math.min(1,p),A.type);
  if(A.spin&&p>0.3&&p<0.75){P.spinYaw+=A.spin/(A.dur*0.45)*dt;}
  if(p>0.26&&p<0.72){R.tipWorld(P._tip);R.midWorld(P._mid);
   P.trail.emit(P._tip,P._mid);
   P.sparkT-=dt;if(P.sparkT<=0){P.sparkT=0.06;FX.burst(P._tip,0x99ffdd,3,2.2,0.16);}
   P.pos.addScaledVector(new THREE.Vector3(Math.sin(P.yaw),0,Math.cos(P.yaw)),A.step*dt*2.2);}
  if(!P.hitDone&&p>=0.4){P.hitDone=true;meleeSweep(A.dmg,A.range,A.arc,A.launch,A.type);}
  if(p>=1){P.state='IDLE';P.spinYaw=0;P.comboWindow=0.75;
   if(P.queued&&P.atkIndex<2){P.queued=false;doAttack(false);}}}
 else if(P.state==='MUSOU'){P.t+=dt;
  R.poseLocomotion(0.3,dt,tg);R.poseAttack((P.t*2.4)%1,0);
  P.spinYaw+=dt*11;
  R.tipWorld(P._tip);R.midWorld(P._mid);P.trail.emit(P._tip,P._mid);
  if(P.t>1.15){P.state='IDLE';P.spinYaw=0;}}
 else if(P.state==='DEAD'){P.t+=dt;R.poseDeath(P.t);}
 else{R.poseLocomotion(spd,dt,tg);P.trail.fade();
  let best=null,bd=8;
  for(const s2 of soldiers){if(s2.state==='DEAD')continue;const d=s2.pos.distanceTo(P.pos);if(d<bd){bd=d;best=s2;}}
  if(best&&!firstPerson)R.lookAt(best.pos.clone().setY(1.5));}
 if(R.bladeMat&&R.bladeMat.emissiveIntensity>0.2)R.bladeMat.emissiveIntensity*=0.9;
 R.root.position.copy(P.pos);
 R.root.rotation.y=P.yaw+P.spinYaw;
 R.applyPose(dt,P.state==='ATTACK'||P.state==='MUSOU'?20:13);
 const velW=mv.clone().multiplyScalar(spd);
 if(P.dashT>0)velW.copy(P.dashDir).multiplyScalar(14);
 R.updateCloth(dt,velW);
}

// ---------- 미니맵 ----------
const mm=document.getElementById('mm'),mctx=mm.getContext('2d');
function drawMinimap(){const cx=58,cy=58,scale=1.55;
 mctx.clearRect(0,0,116,116);
 mctx.save();mctx.beginPath();mctx.arc(cx,cy,55,0,TAU);mctx.clip();
 mctx.fillStyle='rgba(30,20,12,0.75)';mctx.fillRect(0,0,116,116);
 mctx.fillStyle='#c8a030';
 for(const f of flagPos){const dx=(f[0]-player.pos.x)*scale,dz=(f[1]-player.pos.z)*scale;
  if(dx*dx+dz*dz<52*52)mctx.fillRect(cx+dx-2,cy+dz-2,4,4);}
 for(const s2 of soldiers){if(s2.state==='DEAD')continue;
  const dx=(s2.pos.x-player.pos.x)*scale,dz=(s2.pos.z-player.pos.z)*scale;
  if(dx*dx+dz*dz>52*52)continue;
  mctx.fillStyle=s2.elite?'#ff6633':'#ee3333';
  mctx.beginPath();mctx.arc(cx+dx,cy+dz,s2.elite?3.4:2.4,0,TAU);mctx.fill();}
 mctx.save();mctx.translate(cx,cy);mctx.rotate(PI-player.yaw);
 mctx.fillStyle='#ffffff';mctx.beginPath();
 mctx.moveTo(0,-6);mctx.lineTo(4.4,4.4);mctx.lineTo(0,2);mctx.lineTo(-4.4,4.4);mctx.closePath();mctx.fill();
 mctx.restore();mctx.restore();
 mctx.strokeStyle='rgba(255,220,150,0.35)';mctx.lineWidth=1.5;
 mctx.beginPath();mctx.arc(cx,cy,54,0,TAU);mctx.stroke();}

// ---------- HUD ----------
function tickHud(dt){
 document.getElementById('hp').style.width=(player.hp/player.maxHp*100)+'%';
 document.getElementById('hpg').style.width=(player.hp/player.maxHp*100)+'%';
 const mb=document.getElementById('musou');mb.style.width=player.musou+'%';
 mb.classList.toggle('full',player.musou>=100);
 document.getElementById('btn-musou').classList.toggle('ready',player.musou>=100);
 if(comboT>0){comboT-=dt;if(comboT<=0){comboN=0;document.getElementById('combo').style.opacity=0;}}}

// ---------- 시작/루프 ----------
document.getElementById('startBtn').addEventListener('click',()=>{
 SND.init();
 document.getElementById('title').style.display='none';gameOn=true;startStage(0);});
let last=performance.now(),tg=0,mmT=0;
function loop(now){requestAnimationFrame(loop);
 let dt=Math.min(0.045,(now-last)/1000);const frameDtRaw=dt;last=now;
 if(slowMoT>0){slowMoT-=dt;dt*=0.32;}
 if(hitStopT>0){hitStopT-=dt;dt*=0.08;}
 tg+=dt;WIND.t=tg;
 groundMat.uniforms.uTime.value=tg;
 tickAmbient(tg);
 tickBattlefield(dt,tg);
 SND.tickBGM();
 fireA.intensity=2.4+Math.sin(tg*11)*0.9;fireB.intensity=2.2+Math.cos(tg*13)*0.8;
 for(const br of braziers)br.userData.flame.scale.y=1+Math.sin(tg*9+br.position.x)*0.18;
 for(const h2 of huts)if(h2.userData.flame)h2.userData.flame.scale.set(1+Math.sin(tg*7+h2.position.x)*0.15,1+Math.sin(tg*9+h2.position.z)*0.2,1);
 for(const f of flags)f.update(dt);
 if(gameOn){
  tickPlayer(dt,tg);
  tickSpawner(dt);
  for(let i=soldiers.length-1;i>=0;i--){if(!soldiers[i].tick(dt,tg)){
   const dead=soldiers[i];const ai=allies.indexOf(dead);if(ai>=0)allies.splice(ai,1);
   dead.dispose();soldiers.splice(i,1);}}
  tickEArrows(dt);
  if(boss){if(!boss.tick(dt,tg)){boss.dispose();boss=null;}}
  tickRain(dt);
  for(let i=pickups.length-1;i>=0;i--){if(!pickups[i].tick(dt))pickups.splice(i,1);}
  for(let i=horses.length-1;i>=0;i--){if(!horses[i].tick(dt)){horses[i].dispose();horses.splice(i,1);}}
  if(missionT>0){missionT-=dt;
   if(missionT<=0){gameOver=true;endScreen('작전 실패','제한 시간을 넘겼다 · '+rankText());}}
  if(stage===1&&allies.length===0&&gameOn&&!gameOver){
   gameOver=true;endScreen('작전 실패','아군이 전멸했다 · '+rankText());}
  tickHud(dt);
  mmT-=dt;if(mmT<=0){mmT=0.1;drawMinimap();}}
 FX.update(dt);
 // R3 카메라: 낮고 가깝게, 시선은 전방 — 원근 강조
 if(firstPerson){
  const eye=new THREE.Vector3(player.pos.x,player.pos.y+1.74,player.pos.z);
  const f=new THREE.Vector3(Math.sin(player.yaw),0,Math.cos(player.yaw));
  eye.addScaledVector(f,0.5);
  camera.position.lerp(eye,0.5);
  camera.lookAt(eye.x+f.x*10,eye.y-0.4,eye.z+f.z*10);}
 else{
  const fwd=new THREE.Vector3(Math.sin(player.yaw),0,Math.cos(player.yaw));
  const camT=new THREE.Vector3().copy(player.pos).addScaledVector(fwd,-5.6);
  camT.y=player.pos.y+2.9;camT.x+=fwd.z*0.7;camT.z-=fwd.x*0.7;   // 살짝 측면 오프셋
  camera.position.lerp(camT,0.06);
  let cx=camera.position.x,cy=camera.position.y;
  if(shakeMag>0.003){cx+=(Math.random()-0.5)*shakeMag;cy+=(Math.random()-0.5)*shakeMag;shakeMag*=0.86;}
  camera.position.x=cx;camera.position.y=cy;
  const look=new THREE.Vector3().copy(player.pos).addScaledVector(fwd,1.6);
  camera.lookAt(look.x,player.pos.y+1.25,look.z);}
 if(fovKick>0.05){fovKick*=0.85;camera.fov=fovBase+fovKick;camera.updateProjectionMatrix();}
 else if(camera.fov!==fovBase){camera.fov=fovBase;camera.updateProjectionMatrix();}
 gradePass.uniforms.uT.value=tg;
 QUAL.acc+=frameDtRaw;QUAL.frames++;
 if(QUAL.acc>2.0){const fps=QUAL.frames/QUAL.acc;QUAL.acc=0;QUAL.frames=0;
  if(QUAL.ssaoOn&&fps<36){QUAL.ssaoOn=false;ssao.enabled=false;
   renderer.setPixelRatio(Math.min(devicePixelRatio,1.35));
   showBanner('','성능 보호 — 그래픽 자동 조정');}
  else if(!QUAL.ssaoOn&&fps>55&&QUAL.checked<1){QUAL.checked++;}}
 composer.render();}
requestAnimationFrame(loop);
addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();
 renderer.setSize(W(),H());composer.setSize(W(),H());bloom.setSize(W(),H());ssao.setSize(W(),H());});
</script>
